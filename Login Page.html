/* Frontend */
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* Horizontal image gallery */
        .image-gallery {
            display: flex;
            flex-direction: row;
            gap: 16px;
            overflow-x: auto;
            margin: 16px 0;
        }

        .image-gallery img {
            flex: 1 1 0;
            min-width: 0;
            max-width: 100%;
            height: 200px;
            object-fit: cover;
        }

        /* Form spacing */
        .form-group {
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <h1>Login Page</h1>

    <div class="image-gallery">
        <img src="https://via.placeholder.com/320x200?text=Track+Habits" alt="Track Habits">
        <img src="https://via.placeholder.com/320x200?text=Manage+Tasks" alt="Manage Tasks">
        <img src="https://via.placeholder.com/320x200?text=View+Progress" alt="View Progress">
    </div>

    <h2>Why choose us?</h2>

    <form action="/login" method="post">
        <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required>
        </div>
        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
        </div>
        <input type="submit" value="Login">
    </form>
    
</body>
</html>
