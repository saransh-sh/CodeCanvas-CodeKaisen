<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pomodoro – Kaizen AI</title>
  <link rel="stylesheet" href="static/css/style.css" />
  </head>
<body>
  <div class="container">
    <header class="kaizen-header">
      <div class="kaizen-logo">
        <img src="assets/logo.png" alt="Kaizen AI logo" id="kaizenLogo" />
        <span>Kaizen AI</span>
      </div>
      <div class="nav-links">
        <a href="/dashboard.html">Dashboard</a>
        <a href="/activity.html">Activity</a>
        <a href="/graphs.html">Graphs</a>
        <a href="/history.html">History</a>
        <a href="/ai.html">AI</a>
        <a href="/pomodoro.html" class="active">Pomodoro</a>
        <a href="/ambient.html">Ambient</a>
        <a href="/profile.html">Profile</a>
      </div>
      <button class="btn btn-signout" onclick="signOut()">Sign Out</button>
    </header>
        <div class="pomo-header-row">
      <h2>⏱ Pomodoro Focus Mode</h2>
      <button class="btn" onclick="toggleSettings()">⚙ Settings</button>
    </div>
    <div id="settingsPanel" class="settings-panel section">
      <div class="card">
        <h3>Timer Settings</h3>
        <label for="settingWork">Work Duration (minutes)</label>
        <input type="number" id="settingWork" min="1" max="120" value="25" />

        <label for="settingBreak">Break Duration (minutes)</label>
        <input type="number" id="settingBreak" min="1" max="60" value="5" />

        <label for="settingLongBreak">Long Break Duration (minutes)</label>
        <input type="number" id="settingLongBreak" min="1" max="60" value="15" />

        <label for="settingCycles">Number of Cycles</label>
        <input type="number" id="settingCycles" min="1" max="20" value="4" />

        <div class="settings-actions">
          <button class="btn btn-primary" onclick="saveSettings()">Save Settings</button>
        </div>
      </div>
    </div>
    </body>
    </html>
