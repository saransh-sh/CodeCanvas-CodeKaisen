<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ambient Mode – Kaizen AI</title>
  <link rel="stylesheet" href="static/css/style.css" />

  <style>
    .clock {
      font-size: 3.8em;
      font-weight: bold;
      letter-spacing: 5px;
      color: var(--text-primary);
      margin: 4px 0 2px;
    }
    .date {
      font-size: 1em;
      color: var(--text-secondary);
    }

    </style>

</head>
<body>
  <div class="container">
    <header class="kaizen-header">
      <div class="kaizen-logo">
        <img src="assets/logo.png" alt="Kaizen AI logo" id="kaizenLogo" />
        <span>Kaizen AI</span>
      </div>
      <div class="nav-links">
        <a href="/dashboard.html">Dashboard</a>
        <a href="/activity.html">Activity</a>
        <a href="/graphs.html">Graphs</a>
        <a href="/history.html">History</a>
        <a href="/ai.html">AI</a>
        <a href="/pomodoro.html">Pomodoro</a>
        <a href="/ambient.html" class="active">Ambient</a>
        <a href="/profile.html">Profile</a>
      </div>
      <div class="mode-buttons">
        <button class="btn" onclick="switchMode('minimal')">Minimal</button>
        <button class="btn" onclick="switchMode('lofi')">LoFi</button>
      </div>
      <button class="btn btn-signout" onclick="signOut()">Sign Out</button>
    </header>
    
      <div id="minimalMode">
      <div class="mascot-topleft">
        <div class="mascot-container mascot-container-sm" id="mascotArea">
          <img src="assets/mascots/ambient.png" alt="Ambient mascot" id="ambientMascot" />
        </div>
      </div>

       <div class="ambient-panels">
        <div class="card clock-panel">
          <h3>Ambient Focus</h3>
          <div class="clock" id="minimalClock">00:00:00</div>
          <div class="date" id="minimalDate"></div>
        </div>

         <div class="card">
          <h3>Sound Controls</h3>
          <div class="sound-grid">
            <button class="btn sound-btn" onclick="toggleNoise()" id="noiseBtn">▶ White Noise</button>
            <button class="btn sound-btn" onclick="playCustomAudio()" id="customAudioBtn">▶ Custom Audio</button>
          </div>
          <label style="font-size:0.85em; color:var(--text-secondary);">
            Volume:
            <input type="range" id="noiseVolume" min="0" max="1" step="0.05" value="0.3" oninput="setNoiseVolume(this.value)" style="width:100%; margin-top:4px;" />
          </label>
        </div>
        <div class="card">
                <h3>Custom Audio URL</h3>
          <p class="hint">Direct link to an MP3, OGG, or WAV file for background music.</p>
          <input type="url" id="customAudioUrl" placeholder="https://example.com/lofi-beats.mp3" />
          <button class="btn save-btn" onclick="saveCustomAudio()">Save Audio URL</button>
          <p id="audioMsg" class="success-msg"></p>
        </div>

        <div class="card">
          <h3>Custom LoFi Video URL</h3>
          <p class="hint">Direct link to an MP4 video for the LoFi mode background.</p>
          <input type="url" id="customVideoUrl" placeholder="https://example.com/lofi-background.mp4" />
          <button class="btn save-btn" onclick="saveCustomVideo()">Save Video URL</button>
          <p id="videoMsg" class="success-msg"></p>
        </div>

      </div>
    </div>

  </div>
  <div id="lofiMode" class="hidden">
    <div id="videoContainer">
      <video id="bgVideo" autoplay loop muted playsinline>
        <source src="" type="video/mp4" />
      </video>
    </div>

    <div class="lofi-overlay">
      <div class="lofi-clock" id="lofiClock">00:00:00</div>
      <div>
        <button class="btn" onclick="toggleNoise()" id="lofiNoiseBtn">▶ White Noise</button>
        <button class="btn" onclick="playCustomAudio()" id="lofiCustomAudioBtn">▶ Audio</button>
        <label style="color:#ccc; font-size:0.85em; margin-left:8px;">Vol: <input type="range" id="lofiVolume" min="0" max="1" step="0.05" value="0.3" oninput="setNoiseVolume(this.value)" /></label>
      </div>
      <div>
        <button class="btn" onclick="toggleFullscreen()" id="fullscreenBtn">⛶ Fullscreen</button>
        <button class="btn" onclick="switchMode('minimal')">Exit LoFi</button>
      </div>
    </div>
  </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="static/js/auth.js"></script>
    <script>
    requireAuth(() => {});
    const savedAudioUrl = localStorage.getItem("kaizen_ambient_audio");
    const savedVideoUrl = localStorage.getItem("kaizen_ambient_video");
    if (savedAudioUrl) document.getElementById("customAudioUrl").value = savedAudioUrl;
    if (savedVideoUrl) document.getElementById("customVideoUrl").value = savedVideoUrl;
        function updateClocks() {
      const now = new Date();
      const timeStr = now.toLocaleTimeString();
      const dateStr = now.toLocaleDateString(undefined, { weekday: "long", year: "numeric", month: "long", day: "numeric" });
      document.getElementById("minimalClock").textContent = timeStr;
      document.getElementById("minimalDate").textContent  = dateStr;
      document.getElementById("lofiClock").textContent    = timeStr;
    }
    updateClocks();
    setInterval(updateClocks, 1000);
        function switchMode(mode) {
      if (mode === "lofi") {
        document.getElementById("minimalMode").classList.add("hidden");
        document.getElementById("lofiMode").classList.remove("hidden");

        const videoUrl = localStorage.getItem("kaizen_ambient_video");
        if (videoUrl) {
          const video = document.getElementById("bgVideo");
          video.querySelector("source").src = videoUrl;
          video.load();
          video.play().catch(() => {});
        }
      } else {
        document.getElementById("lofiMode").classList.add("hidden");
        document.getElementById("minimalMode").classList.remove("hidden");
      }
    }
        let audioCtx = null;
    let noiseNode = null;
    let gainNode  = null;
    let noiseOn   = false;

    function createWhiteNoise(volume) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const bufferSize = 2 * audioCtx.sampleRate;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = Math.random() * 2 - 1;
      }
      noiseNode = audioCtx.createBufferSource();
      noiseNode.buffer = buffer;
      noiseNode.loop = true;

      gainNode = audioCtx.createGain();
      gainNode.gain.value = volume;

      noiseNode.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      noiseNode.start();
    }

    function toggleNoise() {
  
      stopCustomAudio();

      if (noiseOn) {
        if (noiseNode) { noiseNode.stop(); noiseNode = null; }
        if (audioCtx) { audioCtx.close(); audioCtx = null; }
        noiseOn = false;
        document.getElementById("noiseBtn").textContent = "▶ White Noise";
        document.getElementById("noiseBtn").classList.remove("active");
        document.getElementById("lofiNoiseBtn").textContent = "▶ White Noise";
      } else {
        const vol = parseFloat(document.getElementById("noiseVolume").value);
        createWhiteNoise(vol);
        noiseOn = true;
        document.getElementById("noiseBtn").textContent = "⏹ White Noise";
        document.getElementById("noiseBtn").classList.add("active");
        document.getElementById("lofiNoiseBtn").textContent = "⏹ White Noise";
      }
    }

    function setNoiseVolume(val) {
      if (gainNode) gainNode.gain.value = parseFloat(val);
      if (customAudioEl) customAudioEl.volume = parseFloat(val);

      document.getElementById("noiseVolume").value = val;
      document.getElementById("lofiVolume").value  = val;
    }
        let customAudioEl = null;
    let customAudioPlaying = false;

    function saveCustomAudio() {
      const url = document.getElementById("customAudioUrl").value.trim();
      if (url) {
        localStorage.setItem("kaizen_ambient_audio", url);
        document.getElementById("audioMsg").textContent = "Audio URL saved!";
      } else {
        localStorage.removeItem("kaizen_ambient_audio");
        document.getElementById("audioMsg").textContent = "Audio URL cleared.";
      }
    }

    function saveCustomVideo() {
      const url = document.getElementById("customVideoUrl").value.trim();
      if (url) {
        localStorage.setItem("kaizen_ambient_video", url);
        document.getElementById("videoMsg").textContent = "Video URL saved! Switch to LoFi mode to see it.";
      } else {
        localStorage.removeItem("kaizen_ambient_video");
        document.getElementById("videoMsg").textContent = "Video URL cleared.";
      }
    }

    function playCustomAudio() {
      const audioUrl = localStorage.getItem("kaizen_ambient_audio");
      if (!audioUrl) {
        alert("No custom audio URL saved. Enter a URL above and click Save.");
        return;
      }
       if (noiseOn) {
        if (noiseNode) { noiseNode.stop(); noiseNode = null; }
        if (audioCtx) { audioCtx.close(); audioCtx = null; }
        noiseOn = false;
        document.getElementById("noiseBtn").textContent = "▶ White Noise";
        document.getElementById("noiseBtn").classList.remove("active");
        document.getElementById("lofiNoiseBtn").textContent = "▶ White Noise";
      }

      if (customAudioPlaying) {
        stopCustomAudio();
        return;
      }

      customAudioEl = new Audio(audioUrl);
      customAudioEl.loop = true;
      customAudioEl.volume = parseFloat(document.getElementById("noiseVolume").value || document.getElementById("lofiVolume").value);
      customAudioEl.play().catch(e => alert("Could not play audio: " + e.message));
      customAudioPlaying = true;
      document.getElementById("customAudioBtn").textContent = "⏹ Custom Audio";
      document.getElementById("customAudioBtn").classList.add("active");
      if (document.getElementById("lofiCustomAudioBtn")) {
        document.getElementById("lofiCustomAudioBtn").textContent = "⏹ Audio";
      }
    }
        function stopCustomAudio() {
      if (customAudioEl) {
        customAudioEl.pause();
        customAudioEl.currentTime = 0;
        customAudioEl = null;
      }
      customAudioPlaying = false;
      document.getElementById("customAudioBtn").textContent = "▶ Custom Audio";
      document.getElementById("customAudioBtn").classList.remove("active");
      if (document.getElementById("lofiCustomAudioBtn")) {
        document.getElementById("lofiCustomAudioBtn").textContent = "▶ Audio";
      }
    }

        function toggleFullscreen() {
      if (document.fullscreenElement) {
        document.exitFullscreen();
      } else {
        document.documentElement.requestFullscreen().catch(() => {});
      }
    }

    document.addEventListener("fullscreenchange", () => {
      const btn = document.getElementById("fullscreenBtn");
      if (document.fullscreenElement) {
        btn.textContent = "⛶ Exit Fullscreen";
      } else {
        btn.textContent = "⛶ Fullscreen";
      }
    });

        async function loadMascot() {
      await loadKaizenGifs("ambientMascot", "ambient");
    }
    loadMascot();
  </script>
</body>
</html>
