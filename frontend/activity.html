<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Activity – Kaizen AI</title>
  <link rel="stylesheet" href="static/css/style.css" />
  <style>
    .habit-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-light); padding: 6px 0; }
    .log-item { border-bottom: 1px solid var(--border-light); padding: 4px 0; }
    .cat { color: var(--text-muted); font-size: 0.85em; }
    .category-header { font-weight: bold; margin-top: 12px; margin-bottom: 4px; font-size: 1.05em; }
    .category-header:first-child { margin-top: 0; }
    .duplicate-warning { color: #d63000; font-weight: 500; }
  </style>
</head>
<body>
  <div class="container">
    <header class="kaizen-header">
      <div class="kaizen-logo">
        <img src="/assets/logo.png" alt="Kaizen AI logo" id="kaizenLogo" />
        <span>Kaizen AI</span>
      </div>
      <div class="nav-links">
        <a href="/dashboard.html">Dashboard</a>
        <a href="/activity.html" class="active">Activity</a>
        <a href="/graphs.html">Graphs</a>
        <a href="/history.html">History</a>
        <a href="/ai.html">AI</a>
        <a href="/pomodoro.html">Pomodoro</a>
        <a href="/ambient.html">Ambient</a>
        <a href="/profile.html">Profile</a>
      </div>
      <button class="btn btn-signout" onclick="signOut()">Sign Out</button>
    </header>
    </div>

     <h2>Activity &amp; Habits</h2>

    <div class="grid-2">
    
      <div>
        <div class="card">
          <h3>My Habits</h3>
          <div id="habitList">Loading…</div>
        </div>

        <div class="card section">
          <h3>Log Activity</h3>
          <label>Habit</label>
          <select id="logHabitSelect"><option value="">-- select --</option></select>
          <label>Minutes Spent</label>
          <input type="number" id="logMinutes" min="1" value="30" />
          <label>Date</label>
          <input type="date" id="logDate" />
          <button class="btn btn-primary" onclick="logActivity()">Log Activity</button>
          <p id="logMsg"></p>
        </div>

        <div class="card section">
          <h3>Today's Logs</h3>
          <div id="todayLogs">Loading…</div>
        </div>
      </div>

       <div>
        <div class="card">
          <h3>Create New Habit</h3>
          <label>Habit Name</label>
          <input type="text" id="habitName" placeholder="e.g. Coding Practice" />
          <label>Category</label>
          <input type="text" id="habitCategory" placeholder="e.g. Coding, Fitness, Learning" />
          <label>Target Time (minutes)</label>
          <div style="display:flex; align-items:center; gap:8px;">
            <button class="btn btn-sm" onclick="adjustTarget(-15)">-15m</button>
            <span id="targetDisplay">60</span> min
            <button class="btn btn-sm" onclick="adjustTarget(15)">+15m</button>
          </div>
          <input type="number" id="habitTarget" value="60" min="1" style="margin-top:8px;" />
          <button class="btn btn-primary" onclick="createHabit()" style="margin-top:8px;">Add Habit</button>
          <p id="habitMsg"></p>
        </div>

        <div class="card section">
          <h3>Daily Notes</h3>
          <label>Date</label>
          <input type="date" id="noteDate" />
          <textarea id="noteContent" rows="4" placeholder="e.g. Solved 3 LeetCode problems today."></textarea>
          <button class="btn btn-primary" onclick="saveNote()">Save Note</button>
          <p id="noteMsg"></p>
          <div class="pixel-divider"></div>
          <h4>Recent Notes</h4>
          <div id="notesList">Loading…</div>
        </div>
      </div>
    </div>
  </div>

  
</body>
</html>
