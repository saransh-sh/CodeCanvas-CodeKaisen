<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Activity – Kaizen AI</title>
  <link rel="stylesheet" href="static/css/style.css" />
  <link rel="stylesheet" href="static/css/theme.css" />
  <link rel="stylesheet" href="static/css/components.css" />
  <script src="static/js/firebase-init.js"></script>
  <script src="static/js/theme.js"></script>
  <style>
    .habit-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-light); padding: 6px 0; }
    .log-item { border-bottom: 1px solid var(--border-light); padding: 4px 0; }
    .cat { color: var(--text-muted); font-size: 0.85em; }
    .category-header { font-weight: bold; margin-top: 12px; margin-bottom: 4px; font-size: 1.05em; }
    .category-header:first-child { margin-top: 0; }
    .duplicate-warning { color: #d63000; font-weight: 500; 
    .habit-edit-form { background: var(--bg-hover); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 8px; margin: 4px 0; }
.habit-edit-form input { width: 100%; margin: 3px 0; padding: 4px 6px; border: 1px solid var(--border-color); border-radius: var(--radius-sm); font-family: var(--font-base); font-size: 0.9em; background: var(--bg-secondary); color: var(--text-primary); }
.habit-edit-row { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
.log-edit-form { background: var(--bg-hover); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 8px; margin: 4px 0; }
.log-edit-form input, .log-edit-form select { width: 100%; margin: 3px 0; padding: 4px 6px; border: 1px solid var(--border-color); border-radius: var(--radius-sm); font-family: var(--font-base); font-size: 0.9em; background: var(--bg-secondary); color: var(--text-primary); }
.log-item-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="kaizen-header">
      <div class="kaizen-logo">
        <img src="https://media.tenor.com/1IUGHB0K5tUAAAAi/evernight-hsr.gif" alt="Kaizen AI logo" id="kaizenLogo" />
        <span>Kaizen AI</span>
      </div>
      <div class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="activity.html" class="active">Activity</a>
        <a href="graphs.html">Graphs</a>
        <a href="history.html">History</a>
        <a href="ai.html">AI</a>
        <a href="pomodoro.html">Pomodoro</a>
        <a href="ambient.html">Ambient</a>
        <a href="leaderboard.html">Leaderboard</a>
        <a href="profile.html">Profile</a>
      </div>
      <button class="btn btn-signout" onclick="signOut()">Sign Out</button>
    </header>
    </div>

     <h2>Activity &amp; Habits</h2>
     <p id="activityDate" style="color:var(--text-secondary);margin:0 0 8px;font-size:0.95em;"></p>

    <div class="grid-2">
    
      <div>
        <div class="card">
          <h3>My Habits</h3>
          <div id="habitList">Loading…</div>
        </div>

        <div class="card section">
          <h3>Log Activity</h3>
          <label>Habit</label>
          <select id="logHabitSelect"><option value="">-- select --</option></select>
          <label>Minutes Spent</label>
          <input type="number" id="logMinutes" min="1" value="30" />
          <label>Date</label>
          <input type="date" id="logDate" />
          <button id="logActivityBtn" class="btn btn-primary" onclick="logActivity()">Log Activity</button>
          <p id="logMsg"></p>
        </div>

        <div class="card section">
          <h3>Today's Logs</h3>
          <div id="todayLogs">Loading…</div>
        </div>
      </div>

       <div>
        <div class="card">
          <h3>Create New Habit</h3>
          <label>Habit Name</label>
          <input type="text" id="habitName" placeholder="e.g. Coding Practice" />
          <label>Category</label>
          <input type="text" id="habitCategory" placeholder="e.g. Coding, Fitness, Learning" />
          <label>Target Time (minutes)</label>
          <div style="display:flex; align-items:center; gap:8px;">
            <button class="btn btn-sm" onclick="adjustTarget(-15)">-15m</button>
            <span id="targetDisplay">60</span> min
            <button class="btn btn-sm" onclick="adjustTarget(15)">+15m</button>
          </div>
          <input type="number" id="habitTarget" value="60" min="1" style="margin-top:8px;" />
          <button class="btn btn-primary" onclick="createHabit()" style="margin-top:8px;">Add Habit</button>
          <p id="habitMsg"></p>
        </div>

        <div class="card section">
          <h3>Daily Notes</h3>
          <label>Date</label>
          <input type="date" id="noteDate" />
          <textarea id="noteContent" rows="4" placeholder="e.g. Solved 3 LeetCode problems today."></textarea>
          <button class="btn btn-primary" onclick="saveNote()">Save Note</button>
          <p id="noteMsg"></p>
          <div class="pixel-divider"></div>
          <h4>Recent Notes</h4>
          <div id="notesList">Loading…</div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="static/js/auth.js"></script>
  <script>

const today = new Date().toISOString().split("T")[0];
    document.getElementById("logDate").value = today;
    document.getElementById("noteDate").value = today;
    loadKaizenGifs();
    (function() {
  const now = new Date();
  const day = String(now.getDate()).padStart(2, '0');
  const mon = now.toLocaleString('en-US', { month: 'short' });
  const year = now.getFullYear();
  document.getElementById('activityDate').textContent = `${day} ${mon} ${year}`;
})();

    let targetMinutes = 60;
    let cachedHabits = [];

    function adjustTarget(delta) {
      targetMinutes = Math.max(15, targetMinutes + delta);
      document.getElementById("targetDisplay").textContent = targetMinutes;
      document.getElementById("habitTarget").value = targetMinutes;
    }

    document.getElementById("habitTarget").addEventListener("input", (e) => {
      targetMinutes = parseInt(e.target.value) || 60;
      document.getElementById("targetDisplay").textContent = targetMinutes;
    });

    requireAuth(async (user) => {
      await loadHabits();
      await loadTodayLogs();
      await loadNotes();
    });

    async function loadHabits() {
      try {
        const habits = await apiFetch("/api/habits");
        cachedHabits = habits;
        const listEl = document.getElementById("habitList");
        const selectEl = document.getElementById("logHabitSelect");
        selectEl.innerHTML = '<option value="">-- select --</option>';
        if (!habits.length) { listEl.textContent = "No habits yet."; return; }

        const groups = {};
        habits.forEach(h => {
          const cat = h.category || "Uncategorized";
          if (!groups[cat]) groups[cat] = [];
          groups[cat].push(h);
        });

        let html = "";
        for (const [category, items] of Object.entries(groups)) {
          html += `<div class="category-header">${category}</div>`;
          html += items.map(h =>
  `<div class="habit-item" id="habit-row-${h.id}">
    <span>• <strong>${h.name}</strong> – ${h.target_minutes} min</span>
    <span style="display:flex;gap:4px;">
      <button class="btn btn-sm" onclick="startEditHabit('${h.id}')">✎</button>
      <button class="btn btn-sm" onclick="deleteHabit('${h.id}')">✕</button>
    </span>
  </div>
  <div class="habit-edit-form hidden" id="habit-edit-${h.id}">
    <input type="text" id="hedit-name-${h.id}" placeholder="Habit name" value="${h.name.replace(/"/g,'&quot;')}" />
    <input type="text" id="hedit-cat-${h.id}" placeholder="Category" value="${(h.category||"").replace(/"/g,'&quot;')}" />
    <input type="number" id="hedit-target-${h.id}" placeholder="Target minutes" min="1" value="${h.target_minutes}" />
    <div class="habit-edit-row">
      <button class="btn btn-primary btn-sm" onclick="saveHabitEdit('${h.id}')">Save</button>
      <button class="btn btn-sm" onclick="cancelHabitEdit('${h.id}')">Cancel</button>
    </div>
  </div>`
).join("");
        listEl.innerHTML = html;

        habits.forEach(h => {
          const opt = document.createElement("option");
          opt.value = h.id;
          opt.textContent = h.name;
          selectEl.appendChild(opt);
        });
      }}
       catch (e) {
        document.getElementById("habitList").textContent = "Error loading habits.";
      }
    }

    async function createHabit() {
      const name = document.getElementById("habitName").value.trim();
      const category = document.getElementById("habitCategory").value.trim();
      const target_minutes = parseInt(document.getElementById("habitTarget").value) || 60;
      const msgEl = document.getElementById("habitMsg");
      msgEl.className = "";
      if (!name) { msgEl.textContent = "Habit name required."; return; }

     
      const duplicate = cachedHabits.some(h =>
        h.name.toLowerCase() === name.toLowerCase() &&
        (h.category || "").toLowerCase() === category.toLowerCase()
      );
      if (duplicate) {
        msgEl.textContent = "A habit with this name already exists in this category.";
        msgEl.className = "duplicate-warning";
        return;
      }

      try {
        await apiFetch("/api/habits", {
          method: "POST",
          body: JSON.stringify({ name, category, target_minutes }),
        });
        msgEl.textContent = "Habit created!";
        document.getElementById("habitName").value = "";
        document.getElementById("habitCategory").value = "";
        await loadHabits();
      } catch (e) {
        msgEl.textContent = e.message;
      }
    }


     async function deleteHabit(id) {
      if (!confirm("Delete this habit?")) return;
      try {
        await apiFetch(`/api/habits/${id}`, { method: "DELETE" });
        await loadHabits();
      } catch (e) { alert(e.message); }
    }

    function startEditHabit(id) {
  document.getElementById(`habit-row-${id}`).classList.add("hidden");
  document.getElementById(`habit-edit-${id}`).classList.remove("hidden");
}

function cancelHabitEdit(id) {
  document.getElementById(`habit-row-${id}`).classList.remove("hidden");
  document.getElementById(`habit-edit-${id}`).classList.add("hidden");
}

async function saveHabitEdit(id) {
  const name = document.getElementById(`hedit-name-${id}`).value.trim();
  const category = document.getElementById(`hedit-cat-${id}`).value.trim();
  const target_minutes = parseInt(document.getElementById(`hedit-target-${id}`).value) || 60;
  if (!name) { alert("Habit name is required."); return; }
  try {
    await apiFetch(`/api/habits/${id}`, {
      method: "PUT",
      body: JSON.stringify({ name, category, target_minutes }),
    });
    await loadHabits();
  } catch (e) { alert(e.message); }
}


     async function loadTodayLogs() {
  try {
    const logs = await apiFetch(`/api/activity?log_date=${today}`);
    const el = document.getElementById("todayLogs");
    if (!logs.length) { el.textContent = "No activity logged today."; return; }
    el.innerHTML = logs.map(l =>
      `<div class="log-item" id="log-row-${l.id}">
        <div class="log-item-row">
          <span>${l.habit_name}: <strong>${l.minutes_spent} min</strong></span>
          <button class="btn btn-sm" onclick="startEditLog('${l.id}')">✎</button>
          <button class="btn btn-sm" onclick="deleteLog('${l.id}')">✕</button>
        </div>
        <div class="log-edit-form hidden" id="log-edit-${l.id}">
          <select id="ledit-habit-${l.id}"></select>
          <input type="number" id="ledit-mins-${l.id}" min="1" value="${l.minutes_spent}" />
          <input type="date" id="ledit-date-${l.id}" value="${l.log_date}" />
          <div class="habit-edit-row">
            <button class="btn btn-primary btn-sm" onclick="saveLogEdit('${l.id}')">Save</button>
            <button class="btn btn-sm" onclick="cancelLogEdit('${l.id}')">Cancel</button>
          </div>
        </div>
      </div>`
    ).join("");
    logs.forEach(l => {
      const sel = document.getElementById(`ledit-habit-${l.id}`);
      if (!sel) return;
      cachedHabits.forEach(h => {
        const opt = document.createElement("option");
        opt.value = h.id;
        opt.textContent = h.name;
        if (h.id === l.habit_id || (!l.habit_id && h.name === l.habit_name)) opt.selected = true;
        sel.appendChild(opt);
      });
    });
  } catch (_) {}
}

      function startEditLog(id) {
  document.getElementById(`log-row-${id}`).querySelector('.log-item-row').classList.add("hidden");
  document.getElementById(`log-edit-${id}`).classList.remove("hidden");
}

function cancelLogEdit(id) {
  document.getElementById(`log-row-${id}`).querySelector('.log-item-row').classList.remove("hidden");
  document.getElementById(`log-edit-${id}`).classList.add("hidden");
}

async function saveLogEdit(id) {
  const selEl = document.getElementById(`ledit-habit-${id}`);
  const habit_id = selEl ? selEl.value : null;
  const habit_name = selEl ? selEl.options[selEl.selectedIndex].text : "";
  const minutes_spent = parseInt(document.getElementById(`ledit-mins-${id}`).value);
  const log_date = document.getElementById(`ledit-date-${id}`).value;
  if (!habit_name) { alert("Select a habit."); return; }
  if (!minutes_spent || minutes_spent < 1) { alert("Enter valid minutes."); return; }
  try {
    await apiFetch(`/api/activity/${id}`, {
      method: "PUT",
      body: JSON.stringify({ habit_id, habit_name, minutes_spent, log_date }),
    });
    await loadTodayLogs();
  } catch (e) { alert(e.message); }
}

    async function logActivity() {
  const habitSelect = document.getElementById("logHabitSelect");
  const habit_id = habitSelect.value || null;
  const habit_name = habitSelect.options[habitSelect.selectedIndex]?.text || "";
  const minutes_spent = parseInt(document.getElementById("logMinutes").value);
  const log_date = document.getElementById("logDate").value;
  if (!habit_name || habit_name === "-- select --") { document.getElementById("logMsg").textContent = "Select a habit."; return; }
  if (!minutes_spent || minutes_spent < 1) { document.getElementById("logMsg").textContent = "Enter valid minutes."; return; }
  try {
    const response = await apiFetch("/api/activity", {
      method: "POST",
      body: JSON.stringify({ habit_id, habit_name, minutes_spent, log_date }),
    });
    document.getElementById("logMsg").textContent = "Activity logged!";
    await loadTodayLogs();
    if (typeof window.kzShowXPGain === 'function') {
      const xpGained = response.xp_gained || 5;
      const logBtn = document.getElementById('logActivityBtn');
      window.kzShowXPGain(xpGained, logBtn);
    }
  } catch (e) { document.getElementById("logMsg").textContent = e.message; }
}

    async function deleteLog(id) {
      try {
        await apiFetch(`/api/activity/${id}`, { method: "DELETE" });
        await loadTodayLogs();
      } catch (e) { alert(e.message); }
    }

     async function saveNote() {
      const content = document.getElementById("noteContent").value.trim();
      const note_date = document.getElementById("noteDate").value;
      if (!content) { document.getElementById("noteMsg").textContent = "Note is empty."; return; }
      try {
        await apiFetch("/api/notes", {
          method: "POST",
          body: JSON.stringify({ content, note_date }),
        });
        document.getElementById("noteMsg").textContent = "Note saved!";
        document.getElementById("noteContent").value = "";
        await loadNotes();
      } catch (e) { document.getElementById("noteMsg").textContent = e.message; }
    }

    async function loadNotes() {
      try {
        const notes = await apiFetch("/api/notes");
        const el = document.getElementById("notesList");
        if (!notes.length) { el.textContent = "No notes yet."; return; }
        el.innerHTML = notes.slice(0, 5).map(n =>
          `<div class="log-item"><strong>${n.note_date}</strong>: ${n.content}</div>`
        ).join("");
      } catch (_) {}
    }
  </script
</body>
</html>
