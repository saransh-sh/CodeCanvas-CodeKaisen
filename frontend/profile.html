<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile – Kaizen AI</title>
  <link rel="stylesheet" href="static/css/style.css" />
  </head>
<body>
  <div class="container">
    <header class="kaizen-header">
      <div class="kaizen-logo">
        <img src="/assets/logo.png" alt="Kaizen AI logo" id="kaizenLogo" />
        <span>Kaizen AI</span>
      </div>
      <div class="nav-links">
        <a href="/dashboard.html">Dashboard</a>
        <a href="/activity.html">Activity</a>
        <a href="/graphs.html">Graphs</a>
        <a href="/history.html">History</a>
        <a href="/ai.html">AI</a>
        <a href="/pomodoro.html">Pomodoro</a>
        <a href="/ambient.html">Ambient</a>
        <a href="/profile.html" class="active">Profile</a>
      </div>
      <button class="btn btn-signout" onclick="signOut()">Sign Out</button>
    </header>

        <div class="profile-header">
      <div class="avatar" id="avatar">Photo</div>
      <div>
        <div class="profile-name" id="profileName">Loading…</div>
        <div class="profile-email" id="profileEmail"></div>
        <div id="memberSince" class="text-muted text-sm"></div>
      </div>
    </div>

    <h3>Your Stats</h3>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="statStreak">–</div>
        <div class="stat-label">Current Streak (days)</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statLongest">–</div>
        <div class="stat-label">Longest Streak</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statHabits">–</div>
        <div class="stat-label">Total Habits</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statLogs">–</div>
        <div class="stat-label">Total Activities</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statMinutes">–</div>
        <div class="stat-label">Total Minutes</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statAvgScore">–</div>
        <div class="stat-label">Avg Productivity %</div>
      </div>
    </div>

</body>
</html>
